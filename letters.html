<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>open when… 💌</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="letters-page-wrap">
  <div class="nav-row">
    <a class="back-btn" href="index.html">←</a>
    <h2 style="margin:0; font-family:'Playfair Display',serif; font-style:italic;">open when…</h2>
    <span style="width:42px;"></span>
  </div>
  <p style="text-align:center; color:#c08090; font-size:0.92rem; margin:-6px 0 24px; font-style:italic;">these are for you, whenever you need them 🤍</p>

  <!-- Hidden source of regular letters -->
  <template id="lettersSource">
    <span class="letter-data" data-icon="😔" data-label="you miss me" data-sub="for when that ache hits">
      <p>My love,</p><p>If you're reading this, it means you feel that little ache in your chest that whispers my name. Close your eyes for a second.</p><p>Imagine my arms around you.<br>Imagine the forehead kiss you always love.<br>Imagine me saying softly, <em>"I'm right here, mon cœur."</em></p><p>Distance doesn't change what we are. Silence doesn't weaken us. If you miss me, it only means what we share is real — and I miss you too, always. Every single day.</p><p>I love you.</p>
    </span>
    <span class="letter-data" data-icon="🌧️" data-label="you're having a bad day" data-sub="for when everything feels heavy">
      <p>Hey love,</p><p>First of all — breathe. In through your nose, out through your mouth. Bad days visit and then they leave. They don't define you.</p><p>You are not your mistakes. You are not this moment. You are the strongest, kindest, most resilient soul I know — and if today feels too heavy, let me carry part of it.</p><p>Tomorrow will feel different. I promise. And whenever you need me, I'm always one call away.</p><p>I love you more than bad days, I promise. 🤍</p>
    </span>
    <span class="letter-data" data-icon="🏆" data-label="you need a pride reminder" data-sub="for when you forget how far you've come">
      <p>Stop for a moment.</p><p>Do you know what I see when I look at you? I see someone who keeps going even when it's hard. Someone who grows quietly, consistently, beautifully.</p><p>You sometimes forget how powerful you are. I see your light, your effort, and the growth that happens every single day. The version of you reading this is already further than the version of you who started — and that's everything.</p><p>I am so incredibly proud of you. Never shrink your glow for anyone.</p><p>All of it — I love it. I love <em>you</em>. 🤍</p>
    </span>
    <span class="letter-data" data-icon="💭" data-label="you need reassurance" data-sub="for when doubt sneaks in">
      <p>Mon cœur,</p><p>If you ever — even for a second — doubt my love, let me be louder than that doubt:</p><p><strong>I am here. Fully, completely, genuinely here.</strong></p><p>You don't have to be perfect to deserve my love. You don't have to earn it or prove it. You already have me — all of me — exactly as you are.</p><p>Whatever that voice in your head is telling you, it's lying. You are wanted. You are chosen. You are loved beyond what words can hold.</p><p>I love you. Full stop. 🤍</p>
    </span>
    <span class="letter-data" data-icon="🥹" data-label="you're feeling grateful for us" data-sub="for the quiet thankful moments">
      <p>My heart,</p><p>If you're reading this thinking about us — about what we've built, about how far we've come — know that I feel it too.</p><p>I'm grateful for your laugh. Your patience. The way you love me without making it complicated. The way you <em>chose</em> me, and keep choosing me.</p><p>I don't take a single day of us for granted. This thing we have is rare, and I know it, and I protect it.</p><p>Thank you for being mine. Thank you for letting me be yours. I love you endlessly.</p><p>— always yours 🤍</p>
    </span>
  </template>

  <div class="letters-board" id="lettersBoard"></div>

  <!-- Special Occasion Letter -->
  <div class="special-letter-wrap">
    <div class="special-divider"><span>✨ special</span></div>

    <div class="special-envelope" id="specialEnvelope">
      <div class="special-envelope-inner">
        <div class="special-seal">💝</div>
        <div class="special-text">
          <div class="special-label">a special message</div>
          <div class="special-sub">enter the code to open</div>
        </div>
        <div class="special-chip unlocked-chip">tap 🔑</div>
      </div>
    </div>

    <!-- Inline PIN pad -->
    <div id="specialPinWrap" style="display:none; margin-top:16px; background:rgba(45,18,24,0.9); border-radius:28px; padding:24px 20px; border:1px solid rgba(255,120,140,0.2);">
      <div style="text-align:center; color:rgba(247,221,224,0.6); font-size:0.78rem; letter-spacing:2px; text-transform:uppercase; margin-bottom:18px;">enter 4-digit code</div>
      <div id="specialDots" style="display:flex; gap:14px; justify-content:center; margin-bottom:22px;">
        <div class="s-dot"></div><div class="s-dot"></div>
        <div class="s-dot"></div><div class="s-dot"></div>
      </div>
      <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px; max-width:220px; margin:0 auto;">
        <button class="s-key" data-k="1">1</button>
        <button class="s-key" data-k="2">2</button>
        <button class="s-key" data-k="3">3</button>
        <button class="s-key" data-k="4">4</button>
        <button class="s-key" data-k="5">5</button>
        <button class="s-key" data-k="6">6</button>
        <button class="s-key" data-k="7">7</button>
        <button class="s-key" data-k="8">8</button>
        <button class="s-key" data-k="9">9</button>
        <button class="s-key" data-k="" style="background:transparent;box-shadow:none;cursor:default;"></button>
        <button class="s-key" data-k="0">0</button>
        <button class="s-key s-del" id="sDelKey">⌫</button>
      </div>
      <div id="specialErr" style="display:none; text-align:center; color:#ff6b85; font-size:0.85rem; margin-top:14px;">wrong code — try again</div>
    </div>
  </div>
</div>

<!-- ====== LETTER MODAL ====== -->
<div class="letter-modal-overlay" id="letterModal">
  <div class="letter-modal-card" id="letterModalCard">
    <div class="letter-modal-header">
      <div class="letter-modal-icon" id="modalIcon">💌</div>
      <div class="letter-modal-title" id="modalTitle">open when…</div>
    </div>
    <div class="letter-modal-body" id="modalBody"></div>
    <div class="letter-modal-close">
      <button class="letter-close-btn" id="closeLetterBtn">seal it back 💌</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
